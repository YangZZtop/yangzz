name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path("Cargo.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', text, re.M)
          if not match:
              raise SystemExit("workspace version not found in Cargo.toml")
          print(match.group(1))
          PY
          )
          NPM_VERSION=$(node -p "require('./npm/package.json').version")
          TS_VERSION=$(node -p "require('./sdk/typescript/package.json').version")
          PY_VERSION=$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path("sdk/python/setup.py").read_text()
          match = re.search(r'version=\"([^\"]+)\"', text)
          if not match:
              raise SystemExit("python sdk version not found in sdk/python/setup.py")
          print(match.group(1))
          PY
          )
          echo "tag=$TAG cargo=$CARGO_VERSION npm=$NPM_VERSION ts=$TS_VERSION py=$PY_VERSION"
          test "$TAG" = "$CARGO_VERSION"
          test "$TAG" = "$NPM_VERSION"
          test "$TAG" = "$TS_VERSION"
          test "$TAG" = "$PY_VERSION"

  build:
    needs: verify-version
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: yangzz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: yangzz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: yangzz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: yangzz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: yangzz.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: yangzz.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --package yangzz

      # macOS Sequoia (15+) silently blocks unsigned arm64 binaries — they hang
      # on startup with no error. Ad-hoc codesigning makes the binary trusted
      # locally without needing an Apple Developer account.
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          codesign -dv "target/${{ matrix.target }}/release/${{ matrix.binary }}" 2>&1 | head -5

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            DEST="yangzz-${{ matrix.target }}.exe"
          else
            DEST="yangzz-${{ matrix.target }}"
          fi
          echo "Renaming $SRC → $DEST ($(stat -c%s "$SRC" 2>/dev/null || stat -f%z "$SRC") bytes)"
          mv "$SRC" "$DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yangzz-${{ matrix.target }}
          path: yangzz-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: yangzz-*
          generate_release_notes: true

  publish-npm:
    if: ${{ vars.HAS_NPM_TOKEN == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare platform npm packages
        run: node npm/scripts/prepare-platform-packages.js --artifacts-dir . --output-dir npm/platform-dist --sync-root-optional-deps

      - name: Publish platform npm packages
        run: |
          for dir in npm/platform-dist/*; do
            echo "Publishing $dir"
            (cd "$dir" && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root npm package
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
